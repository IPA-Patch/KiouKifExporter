name: integration

# CI: build both the rootless .deb (MobileSubstrate path) and the jailed
# .dylib (Dobby-static path) on every push to master / develop and on
# every PR targeting either. Fails fast if the dylib accidentally picks
# up an external hook-engine dependency, since that would brick
# Sideloadly installs.

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

env:
  THEOS: ${{ github.workspace }}/theos
  IOS_SDK_VERSION: "16.5"

jobs:
  commitlint:
    name: CommitLint
    if: github.event.action != 'closed' || github.event.pull_request.merged != true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install commitlint
        run: |
          bun install conventional-changelog-conventionalcommits
          bun install commitlint@latest
      - name: Validate current commit (last commit) with commitlint
        if: github.event_name == 'push'
        run: bunx commitlint --last --verbose
      - name: Validate PR commits with commitlint
        if: github.event_name == 'pull_request'
        run: bunx commitlint --from ${{ github.event.pull_request.head.sha }}~${{ github.event.pull_request.commits }} --to ${{ github.event.pull_request.head.sha }} --verbose
  build:
    name: build (${{ matrix.flavor }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: substrate
            make_args: ""
            artifact_name: kioukifexporter-substrate-deb
            artifact_path: packages/*.deb
          - flavor: jailed
            make_args: "jailed"
            artifact_name: kioukifexporter-jailed-dylib
            artifact_path: packages/jailed/KiouKifExporter.dylib

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          # Sources/Common + shared/ are git submodules referenced by
          # the Makefile (Sources/Common/logging.m, Sources/Common/binpatch.m,
          # shared/tools/build_patched_ipa.sh). Without recursive
          # checkout the Theos build fails with "file not found".
          submodules: recursive

      - name: Install host build tools
        # libtinfo6 / libncurses6 are runtime deps of L1ghtmann's iOS
        # cross-clang (mirror what the devcontainer's Dockerfile installs).
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              build-essential curl git make perl xz-utils \
              libplist-utils libc++-dev \
              libtinfo6 libncurses6

      - name: Install ldid
        # `ldid` isn't packaged for Ubuntu noble (24.04), so we grab the
        # ProcursusTeam fork's prebuilt Linux x86_64 binary the way
        # Theos's own docs recommend. Pin the version so a quiet upstream
        # rotation doesn't break CI without an explicit bump here.
        run: |
          LDID_VERSION="v2.1.5-procursus7"
          curl -L -o /tmp/ldid \
              "https://github.com/ProcursusTeam/ldid/releases/download/${LDID_VERSION}/ldid_linux_x86_64"
          sudo install -m 0755 /tmp/ldid /usr/local/bin/ldid
          ldid -V || ldid 2>&1 | head -1 || true

      - name: Cache Theos
        id: theos-cache
        uses: actions/cache@v4
        with:
          path: |
            theos
          # v3: switched to L1ghtmann's modern toolchain (was sbingner's
          # libtinfo5-linked v10), so any previous cache is unusable.
          key: theos-linux-${{ env.IOS_SDK_VERSION }}-v3

      - name: Install Theos
        if: steps.theos-cache.outputs.cache-hit != 'true'
        run: |
          # Theos bootstrap.
          git clone --recursive https://github.com/theos/theos.git "$THEOS"

          # Linux iOS cross-toolchain — L1ghtmann's modern fork (clang 13,
          # links against ncurses 6 / libtinfo 6). This matches what the
          # devcontainer uses and works on Ubuntu 24.04 noble.
          # The archive's top level extracts straight into a `linux/iphone/`
          # directory under $THEOS/toolchain, which is what Theos's
          # makefiles expect — no rename needed.
          ARCH=$(uname -m)
          curl -fsSL \
              "https://github.com/L1ghtmann/llvm-project/releases/latest/download/iOSToolchain-${ARCH}.tar.xz" \
            | tar xJ -C "$THEOS/toolchain"

          # iOS SDK matching IOS_SDK_VERSION.
          mkdir -p "$THEOS/sdks"
          curl -L -o /tmp/sdk.tar.gz \
              "https://github.com/theos/sdks/archive/master.tar.gz"
          tar -xf /tmp/sdk.tar.gz -C /tmp
          cp -R "/tmp/sdks-master/iPhoneOS${IOS_SDK_VERSION}.sdk" \
                "$THEOS/sdks/"

      - name: Verify Theos
        # Validate every path the Theos build actually uses, so a broken
        # toolchain layout fails here (with a clear error) instead of as
        # an opaque "clang: No such file or directory" during compile.
        run: |
          test -d "$THEOS/sdks/iPhoneOS${IOS_SDK_VERSION}.sdk"
          test -x "$THEOS/toolchain/linux/iphone/bin/clang"
          "$THEOS/toolchain/linux/iphone/bin/clang" --version

      - name: Build (${{ matrix.flavor }})
        run: |
          make clean
          make ${{ matrix.make_args }}

      - name: Stage rootless .deb
        if: matrix.flavor == 'substrate'
        run: |
          make package
          ls -la packages/

      - name: Sanity check jailed dylib (no external hook engine)
        if: matrix.flavor == 'jailed'
        run: |
          DYLIB=packages/jailed/KiouKifExporter.dylib
          test -f "$DYLIB"
          # otool may be unavailable on Linux; fall back to nm-style scan.
          if command -v otool >/dev/null 2>&1; then
              otool -L "$DYLIB"
              if otool -L "$DYLIB" | grep -E "libsubstrate|libdobby"; then
                  echo "::error::Jailed dylib leaks an external hook-engine dependency"
                  exit 1
              fi
          else
              strings "$DYLIB" | grep -E "libsubstrate|libdobby\.dylib" \
                  && { echo "::error::Jailed dylib leaks an external hook-engine dependency"; exit 1; } \
                  || echo "no external hook-engine references found"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 14
